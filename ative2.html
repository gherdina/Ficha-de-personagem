<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <title>formulário</title>
    <link rel="stylesheet" href="ative2-style.css">

</head>



<body>

<li>destinos para as férias</li>

<div class="titulo">

<h1><strong><em>Viagem de inverno</em></strong></h1>

</div>


    <main>
    <form action="get" name="formulário">

<div class="destino">

<label for="get">destino</label>
<input type="text" id="get" name="destino" placeholder="destino da viagem">


</div>

<div class="nome">

<label for="get">nome</label>
<input placeholder="digite seu nome" type="text" name="nome" id="get">

</div>

<div class="sobrenome">

<label for="get">sobrenome</label>
<input type="text" name="sobrenome" id="get" placeholder="digite seu sobrenome">


</div>

<div class="cpf">

<label for="get">cpf ou cnpj</label>
<input type="tel" name="cpf" id="get" placeholder="000.000.000.00">



</div>


<div class="senha">

<label for="get">senha</label>
<input placeholder="digite sua senha" type="password" name="senha" id="get">

</div>


<div class="confirmar-senha">

<label for="get">conf. senha</label>
<input placeholder="confirme sua senha" type="password" name="confirmar senha" id="get">

</div>

<div class="data-nascimento">

<label for="get">data de nascimento</label>
<input type="date" name="data de nascimento" id="get" placeholder="seu nascimento">

</div>


  <div class=¨button¨>

    <button>enviar</button>

</div>

    </form>
    </main>

</body>

</html>
